services:
  - type: web
    name: secpho-intelligence-chat
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python backend_api/mvp_web_app.py
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: OPENAI_MODEL_FLAGSHIP
        value: gpt-5.5
      - key: OPENAI_API_KEY
        sync: false
      - key: SECPHO_API_AUTH_TOKEN
        sync: false
      - key: SECPHO_APP_PASSWORD
        sync: false
      - key: SECPHO_ADMIN_PASSWORD
        sync: false
      - key: SECPHO_SESSION_SECRET
        sync: false
