services:
  - type: web
    name: secpho-intelligence-chat
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python backend_api/mvp_web_app.py
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: OPENAI_MODEL_FLAGSHIP
        value: gpt-5.5
      - key: LLM_DAILY_BUDGET
        value: "1000"
      - key: OPENAI_API_KEY
        sync: false
      # Named accounts: "email|role|pbkdf2_sha256$..." entries joined by ";".
      # Generate with: python scripts/make_user.py EMAIL:ROLE ...
      - key: SECPHO_USERS
        sync: false
      - key: SECPHO_SESSION_SECRET
        generateValue: true
