name: security

# LaunchGuardian scanner stack (Gates 3/4/10) on Linux, where Gitleaks/Semgrep/Trivy run.
# Locally on Windows these are unavailable; CI is the source of truth for the automated layer.

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: pip-audit (dependency vulnerabilities, Gate 10)
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit -r requirements.txt

      - name: Semgrep (static analysis, Gates 3/7/8)
        run: |
          python -m pip install semgrep
          semgrep scan --config p/python --error backend_api recommendation_engine scripts

      - name: Gitleaks (secret scan, Gate 4)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy (filesystem + dependency scan, Gates 10/11)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
