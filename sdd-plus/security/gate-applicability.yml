  - gate_id: 16
    gate_name: "Gate 16 — Multi-Tenant & Internal Permission Isolation"
    applies: false
    confidence: "high"
    status: "N/A"
    evidence:
      - type: "repo_evidence"
        detail: "Single tenant (SECPHO only); there is no org/team/workspace model and no cross-tenant data. The only boundary is user vs admin role, which is covered by Gate 6 (object authorization / is_admin) and Gate 8 (auth/sessions). Documented; this is not a tenant-isolation system."
        reference: "backend_api/mvp_web_app.py:4528-4530 (is_admin role boundary)"
    reason: "No tenant/org/client/team model exists; the single user-vs-admin boundary is handled by Gates 6 and 8. No cross-tenant isolation surface, so no human confirmation required."
    human_confirmation_required: false
    confirmed_by: ""
    confirmed_at: ""
    unresolved_questions: []
  - gate_id: 17
    gate_name: "Gate 17 — Observability, Logs & Incident Readiness"
    applies: true
    confidence: "high"
    status: "BLOCKING"
    evidence:
      - type: "repo_evidence"
        detail: "Handler.log_message is overridden to a no-op, so there are NO access logs. There is no error logging and no monitoring/alerting, leaving no visibility if the app breaks or is abused. REQUIRED before any real use: at least error and key-event logging, plus a named incident owner."
        reference: "backend_api/mvp_web_app.py:4956 (log_message override to no-op)"
    reason: "Always-on gate; deployable projects need logs, incident ownership, and readiness evidence."
    human_confirmation_required: false
    confirmed_by: ""
    confirmed_at: ""
    unresolved_questions:
