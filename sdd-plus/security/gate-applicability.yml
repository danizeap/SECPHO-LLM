  - gate_id: 4
    gate_name: "Gate 4 — Secrets & Config Hygiene"
    applies: true
    confidence: "high"
    status: "PASS"
    evidence:
      - type: "config_evidence"
        detail: "Secrets (OPENAI_API_KEY, SECPHO_API_AUTH_TOKEN, SECPHO_APP_PASSWORD, SECPHO_ADMIN_PASSWORD, SECPHO_SESSION_SECRET) are env-only and marked sync:false in render.yaml (set in the Render dashboard). .gitignore excludes .env/.env.*, data/app_state, and data/generated_artifacts. Manually verified no secret in committed files. Gitleaks not run (CI follow-up)."
        reference: "render.yaml lines 17-26; .gitignore; backend_api/mvp_web_app.py"
    reason: "Always-on gate; the project depends on environment-provided credentials and secrets."
    human_confirmation_required: false
    confirmed_by: ""
    confirmed_at: ""
    unresolved_questions:
      - "Run Gitleaks in Linux CI."
  - gate_id: 5
    gate_name: "Gate 5 — Frontend Exposure"
    applies: true
    confidence: "high"
    status: "PASS WITH FOLLOW-UP"
    evidence:
      - type: "repo_evidence"
        detail: "send_security_headers sets X-Frame-Options DENY, X-Content-Type-Options nosniff, Referrer-Policy, Permissions-Policy, HSTS, and a CSP on every response. RESIDUAL: the CSP allows 'unsafe-inline' for script-src and style-src because the UI inlines all JS/CSS (defense-in-depth weakness). The scanner's 2 'blocking' Gate 5 findings are FALSE POSITIVES inside secpho_env (the venv), not our frontend."
        reference: "backend_api/mvp_web_app.py:4538-4554 (send_security_headers)"
    reason: "Frontend detected; a browser-delivered single-page UI is served with inlined assets."
    human_confirmation_required: false
    confirmed_by: ""
    confirmed_at: ""
    unresolved_questions:
      - "Remove CSP 'unsafe-inline' by externalizing inlined JS/CSS before broad launch (defense-in-depth)."
  - gate_id: 6
    gate_name: "Gate 6 — API Auth & Object Authorization"
    applies: true
    confidence: "high"
    status: "PASS"
    evidence:
      - type: "repo_evidence"
        detail: "All /api/* routes require an authenticated session. Admin endpoints (/api/tool-requests, /api/tool-build-events, /api/feedback-inbox, /admin) are fail-closed and double-gated via is_admin, which requires ADMIN_ENABLED and session role 'admin'. Object-level authz: any authenticated staff user can read any member/socio — ACCEPTED for a single internal trust group. The 27 scanner 'no auth guard' findings are FALSE POSITIVES in secpho_env (pandas.api/joblib); the stdlib router is not recognized by the scanner."
        reference: "backend_api/mvp_web_app.py:4528-4530 (is_admin), do_GET/do_POST routing 4602-4955"
    reason: "API routes detected; the app exposes authenticated /api/* and /admin endpoints."
    human_confirmation_required: false
    confirmed_by: ""
    confirmed_at: ""
    unresolved_questions: []
  - gate_id: 7
    gate_name: "Gate 7 — Injection & Input Safety"
    applies: true
    confidence: "high"
    status: "PASS WITH FOLLOW-UP"
    evidence:
      - type: "repo_evidence"
        detail: "No SQL/DB (CSV-only). Numeric ids are parsed via to_int with a 400 on failure (no 500/traceback). LLM/markdown output is html.escape'd BEFORE limited token substitution in markdown_to_chat_html. Request bodies are size-capped. RESIDUAL XSS surface: 'unsafe-inline' CSP combined with the regex markdown renderer, mitigated by escape-first ordering."
        reference: "backend_api/mvp_web_app.py:176 (to_int), 2972 (markdown_to_chat_html)"
    reason: "User input crosses trust boundaries (chat questions, search queries, ids, feedback text reaching markdown/HTML and the LLM)."
    human_confirmation_required: false
    confirmed_by: ""
    confirmed_at: ""
    unresolved_questions:
      - "Resolve the residual XSS surface by removing 'unsafe-inline' (tracked under Gate 5)."
  - gate_id: 8
    gate_name: "Gate 8 — Auth, Sessions & CSRF"
    applies: true
    confidence: "high"
    status: "PASS WITH FOLLOW-UP"
    evidence:
      - type: "repo_evidence"
        detail: "HMAC-SHA256 signed stateless cookies (HttpOnly; SameSite=Lax; Secure added behind the proxy via X-Forwarded-Proto/RENDER). Constant-time password comparison (hmac.compare_digest), session TTL, and per-IP rate limits (login 8/5min, llm 30/min, api 120/min, feedback 10/5min). GAP: no CSRF token on POST /login, /api/feedback, /api/agent — relies on SameSite=Lax only."
        reference: "backend_api/mvp_web_app.py:274/288-292 (compare_digest), 4533-4536 (cookie flags), 80-84 (RATE_LIMITS)"
    reason: "Auth/session/cookie behavior detected; the app uses password login and signed session cookies."
    human_confirmation_required: false
    confirmed_by: ""
    confirmed_at: ""
    unresolved_questions:
      - "Add CSRF tokens on POST /login, /api/feedback, /api/agent before broad launch."
  - gate_id: 9
    gate_name: "Gate 9 — File Upload, SSRF, Imports & Exports"
    applies: false
    confidence: "medium"
    status: "N/A"
    evidence:
      - type: "repo_evidence"
        detail: "The deployed web app has NO file upload and fetches only a FIXED outbound URL (OpenAI Responses API, https://api.openai.com/v1/responses) with no user-controlled URL. Static/artifact serving applies a Path(...).name basename defense. The event-registration import is an OFFLINE pipeline script, not part of the deployed web app. Low risk; not a high-risk-isolation gate."
        reference: "backend_api/mvp_web_app.py:47 (OPENAI_RESPONSES_URL), 4675/4683 (Path(...).name basename for /static/ and /artifacts/)"
    reason: "No upload, no user-controlled URL fetch, and no in-app import/export in the deployed web app; only a single fixed outbound integration exists. Not high-risk, so no human confirmation required."
    human_confirmation_required: false
    confirmed_by: ""
    confirmed_at: ""
    unresolved_questions: []
  - gate_id: 10
    gate_name: "Gate 10 — Dependency, SBOM & Supply Chain"
    applies: true
    confidence: "high"
    status: "PASS WITH FOLLOW-UP"
    evidence:
      - type: "repo_evidence"
        detail: "requirements.txt is fully pinned (pandas==3.0.2, numpy==2.4.4, scipy==1.17.1, scikit-learn==1.8.0, requests==2.32.5, plus python-dotenv, lxml, xlrd, html5lib, beautifulsoup4). Trivy/pip-audit NOT run (not installable on this host). Follow-up: dependency vulnerability scan in CI."
        reference: "requirements.txt"
    reason: "Always-on gate; the project relies on pinned third-party dependencies."
    human_confirmation_required: false
    confirmed_by: ""
    confirmed_at: ""
    unresolved_questions:
      - "Run a dependency vulnerability scan (Trivy/pip-audit) in Linux CI."
  - gate_id: 11
    gate_name: "Gate 11 — Infrastructure, DNS, TLS & Web Hardening"
    applies: true
    confidence: "high"
    status: "PASS WITH FOLLOW-UP"
    evidence:
      - type: "config_evidence"
        detail: "TLS is terminated by Render; the app binds plain HTTP behind Render's proxy. The Secure cookie flag depends on X-Forwarded-Proto=https or the RENDER env var; HSTS header is set. Render web service 'secpho-intelligence-chat' (plan free)."
        reference: "render.yaml lines 1-7; backend_api/mvp_web_app.py:4533-4536, 4554 (HSTS)"
    reason: "Public deployment/infrastructure detected (Render web service with TLS termination)."
    human_confirmation_required: false
    confirmed_by: ""
    confirmed_at: ""
    unresolved_questions:
      - "Confirm Render forces HTTPS (HTTP-to-HTTPS redirect) for the service."
  - gate_id: 12
    gate_name: "Gate 12 — Resilience, DDoS, Abuse & Cost Defense"
    applies: true
    confidence: "high"
    status: "PASS WITH FOLLOW-UP"
    evidence:
      - type: "repo_evidence"
        detail: "Per-IP in-memory rate limits (per-process; Render free = single instance, acceptable now). AI COST exposure: the agent makes multiple LLM calls per question, mitigated by the 'llm' rate bucket (30/min). Follow-up: shared/persistent rate limiter and OpenAI cost alerts at scale."
        reference: "backend_api/mvp_web_app.py:80-84 (RATE_LIMITS), 4693 (llm bucket selection)"
    reason: "Public exposure plus rate-limit-sensitive AI endpoints create abuse and cost-exposure paths."
    human_confirmation_required: false
    confirmed_by: ""
    confirmed_at: ""
    unresolved_questions:
      - "Add a shared/persistent rate limiter and OpenAI cost alerts before scaling beyond a single instance."
  - gate_id: 13
    gate_name: "Gate 13 — Webhooks, Background Jobs & Integrations"
    applies: true
    confidence: "medium"
    status: "PASS WITH FOLLOW-UP"
    evidence:
      - type: "repo_evidence"
        detail: "The only integration is OpenAI (outbound). The self-extending 'tool-learning loop' auto-builds ONLY the whitelisted create_socio_metric_chart tool (SVG output) and queues riskier proposals for human review — reasonable containment. The codex_review_notes is a placeholder, not a real review."
        reference: "backend_api/mvp_web_app.py:669/773/2215-2222 (create_socio_metric_chart allowlist and build path)"
    reason: "An outbound integration (OpenAI) and an auto-build tool-loop are present, even though there are no inbound webhooks."
    human_confirmation_required: false
    confirmed_by: ""
    confirmed_at: ""
    unresolved_questions:
