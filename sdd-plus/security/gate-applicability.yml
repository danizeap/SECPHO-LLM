# LaunchGuardian Framework (LGF) gate-applicability matrix.
# Project-specific record for the SECPHO Intelligence System security review.
# Documents an assessment that has already been reasoned out (verdicts are fixed).
project: "SECPHO Intelligence System"
change: "intelligence-upgrade (closed password-gated internal SECPHO-staff pilot; unmerged branch atop commit 9d74ede)"
date: "2026-06-17"
owner: "Daniel / SECPHO"
reviewer: "LaunchGuardian (Claude)"

source_of_truth:
  - "sdd-plus/specs/launchguardian-framework.md"
  - "sdd-plus/standards/security-shipping-standards.md"
  - "sdd-plus/security/gate-applicability.template.yml"
  - "sdd-plus/specs/MASTER_LAUNCHGUARDIAN_CONTEXT.md, if present"

status_values:
  applies:
    - true
    - false
    - "unknown"
  confidence:
    - "high"
    - "medium"
    - "low"
  evidence_type:
    - "repo_evidence"
    - "config_evidence"
    - "human_statement"
    - "unresolved_question"

high_risk_skip_rule:
  rule: "For any high-risk gate, applies: false is invalid unless human_confirmation_required, confirmed_by, confirmed_at, reason, and evidence are filled."
  required_when_high_risk_gate_is_skipped:
    human_confirmation_required: true
    confirmed_by: "required"
    confirmed_at: "required"
    reason: "required"
    evidence: "required"

always_on_gates:
  - "Gate 0 — Scope & Permission"
  - "Gate 1 — Product, Asset & Data Inventory"
  - "Gate 3 — Code Security"
  - "Gate 4 — Secrets & Config Hygiene"
  - "Gate 10 — Dependency, SBOM & Supply Chain"
  - "Gate 17 — Observability, Logs & Incident Readiness"
  - "Gate 20 — Launch Decision"

conditional_trigger_rules:
  frontend_detected:
    applies_to:
      - "Gate 5 — Frontend Exposure"
  api_routes_detected:
    applies_to:
      - "Gate 6 — API Auth & Object Authorization"
  user_input_crosses_trust_boundary:
    applies_to:
      - "Gate 7 — Injection & Input Safety"
  auth_sessions_cookies_detected:
    applies_to:
      - "Gate 8 — Auth, Sessions & CSRF"
  upload_import_export_or_url_fetch_detected:
    applies_to:
      - "Gate 9 — File Upload, SSRF, Imports & Exports"
  public_deployment_or_infrastructure_detected:
    applies_to:
      - "Gate 11 — Infrastructure, DNS, TLS & Web Hardening"
      - "Gate 12 — Resilience, DDoS, Abuse & Cost Defense"
  webhooks_jobs_or_integrations_detected:
    applies_to:
      - "Gate 13 — Webhooks, Background Jobs & Integrations"
  personal_or_sensitive_data_detected:
    applies_to:
      - "Gate 14 — Privacy, Legal & Data Lifecycle"
  llm_vector_db_or_agent_tools_detected:
    applies_to:
      - "Gate 15 — AI/RAG/Agent Security"
  tenant_org_client_team_model_detected:
    applies_to:
      - "Gate 16 — Multi-Tenant & Internal Permission Isolation"
  persistent_data_or_rotation_needs_detected:
    applies_to:
      - "Gate 18 — Backup, Recovery, Deletion & Rotation"
  business_rules_credits_payments_plans_invites_detected:
    applies_to:
      - "Gate 19 — Business Logic Abuse"
  production_launch_or_live_users_detected:
    applies_to:
      - "Gate 21 — Continuous Monitoring"

gates:
  - gate_id: 0
    gate_name: "Gate 0 — Scope & Permission"
    applies: true
    confidence: "high"
    status: "PASS"
    evidence:
      - type: "human_statement"
        detail: "Owner (Daniel / SECPHO, WeCollabify) authorized this LGF review of the owned local repo. Intended users are authenticated SECPHO staff (single internal trust group); the public and unauthenticated users are out of scope."
        reference: "Owner statement; repo root C:/Users/Daniel Paez/Desktop/secpho_intelligence_system"
    reason: "Always-on gate; review scope is explicitly owner-approved for an owned local repo."
    human_confirmation_required: true
    confirmed_by: "Daniel / SECPHO"
    confirmed_at: "2026-06-17"
    unresolved_questions: []
  - gate_id: 1
    gate_name: "Gate 1 — Product, Asset & Data Inventory"
    applies: true
    confidence: "high"
    status: "PASS"
    evidence:
      - type: "repo_evidence"
        detail: "Single-file stdlib http.server app (backend_api/mvp_web_app.py) plus precomputed CSVs in data/processed and recommendation_engine/outputs. Data classes inventoried: member PII (names, emails, role, company, location, technologies, optional personal context), socio/company data, 7968 newsletter subscriber emails (suscriptores_normalized.csv), captured feedback (feedback_inbox.md), and secrets (env-only). Integrations: OpenAI Responses API (outbound) and Render hosting."
        reference: "backend_api/mvp_web_app.py; data/processed; recommendation_engine/outputs; render.yaml"
    reason: "Always-on gate; this review produces the asset/data inventory."
    human_confirmation_required: false
    confirmed_by: ""
    confirmed_at: ""
    unresolved_questions: []
  - gate_id: 2
    gate_name: "Gate 2 — Threat Modeling"
    applies: true
    confidence: "high"
    status: "PASS"
    evidence:
      - type: "repo_evidence"
        detail: "Threat model produced. High-impact features driving it: password-gated auth and signed sessions, member + subscriber PII processed and sent to OpenAI, public Render deployment, and a bounded LLM agent with a self-extending tool-learning loop."
        reference: "backend_api/mvp_web_app.py (verify_session, run_agent, create_socio_metric_chart)"
    reason: "High-impact features (auth, PII, public deploy, LLM agent) require threat modeling."
    human_confirmation_required: false
    confirmed_by: ""
    confirmed_at: ""
    unresolved_questions: []
  - gate_id: 3
    gate_name: "Gate 3 — Code Security"
    applies: true
    confidence: "high"
    status: "PASS WITH FOLLOW-UP"
    evidence:
      - type: "repo_evidence"
        detail: "Manual review plus per-feature adversarial verifier reviews completed this session. Semgrep was NOT run (not installable on this Windows host). Follow-up: run Semgrep in Linux CI."
