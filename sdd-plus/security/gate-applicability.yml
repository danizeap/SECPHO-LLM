        reference: "Findings tally: Critical 0; High/blocking 3 (Gate 14 broad-launch privacy, Gate 17 observability, Gate 18 ephemeral data loss); ~6 medium follow-ups."
    reason: "Always-on gate; every LGF review requires an explicit owner launch decision."
