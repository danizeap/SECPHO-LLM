  - gate_id: 14
    gate_name: "Gate 14 — Privacy, Legal & Data Lifecycle"
    applies: true
    confidence: "high"
    status: "BLOCKING (broad/external launch); CONDITIONAL ACCEPT (closed internal pilot)"
    evidence:
      - type: "repo_evidence"
        detail: "Member + subscriber PII is processed and sent to OpenAI for phrasing, with NO privacy notice, retention policy, or data-subject-request path; EU/Spain GDPR applies. For a CLOSED internal staff pilot over SECPHO's own data this is legitimate-interest internal use with lower exposure — acceptable WITH owner awareness. REQUIRED before broad use: documented privacy stance, retention policy, DSR path, and a data-processing note for the OpenAI sub-processor."
        reference: "backend_api/mvp_web_app.py (OpenAI call path; member/subscriber CSVs); data/processed; recommendation_engine/outputs"
    reason: "Personal/sensitive data detected (member PII and 7968 subscriber emails), processed and shared with a sub-processor."
    human_confirmation_required: false
    confirmed_by: ""
    confirmed_at: ""
    unresolved_questions:
      - "Before broad use: publish a privacy stance, define retention, add a DSR path, and document OpenAI as a sub-processor."
  - gate_id: 15
    gate_name: "Gate 15 — AI/RAG/Agent Security"
    applies: true
    confidence: "high"
    status: "PASS WITH FOLLOW-UP"
    evidence:
      - type: "repo_evidence"
        detail: "Strong grounding: scores are deterministic (the LLM cannot invent or reorder results); bulk people lists DROP emails via _agent_compact_person (a compensating control against prompt-injection exfiltration); the agent loop is bounded (run_agent max_steps=6) and exception-safe, falling back to a deterministic router. RESIDUAL: prompt injection from user messages or from DATA text (reto/profile free-text) is not formally tested."
        reference: "backend_api/mvp_web_app.py:2741 (_agent_compact_person), 2918-2943 (run_agent max_steps)"
    reason: "LLM/agent tooling detected; the app runs a bounded LLM agent with a tool loop over member data."
    human_confirmation_required: false
    confirmed_by: ""
    confirmed_at: ""
    unresolved_questions:
