  - gate_id: 18
    gate_name: "Gate 18 — Backup, Recovery, Deletion & Rotation"
    applies: true
    confidence: "high"
    status: "BLOCKING"
    evidence:
      - type: "repo_evidence"
        detail: "data/app_state (feedback_inbox.md, tool-loop state, the persisted .session_secret) lives on Render's EPHEMERAL disk and is wiped on every redeploy. Captured feedback (the point of the loop) is lost, and sessions break across redeploys unless SECPHO_SESSION_SECRET is set as an env var. REQUIRED: set SECPHO_SESSION_SECRET; provide durable storage for feedback (or strict export-before-redeploy); define a secret rotation plan."
        reference: "backend_api/mvp_web_app.py:45 (FEEDBACK_INBOX_PATH), 58 (.session_secret); render.yaml line 25 (SECPHO_SESSION_SECRET sync:false)"
    reason: "Persistent data and rotatable secrets are present (feedback store, session secret) but rely on ephemeral disk."
    human_confirmation_required: false
    confirmed_by: ""
    confirmed_at: ""
    unresolved_questions:
      - "Set SECPHO_SESSION_SECRET on Render; add durable storage (or export-before-redeploy) for feedback; define a secret rotation plan."
  - gate_id: 19
