# LaunchGuardian Framework — Gate 1 product/asset/data inventory.
# Documentation of an existing assessment (2026-06-17). Verdicts are the
# authoritative source of truth; concrete route/function names grounded in
# backend_api/mvp_web_app.py, requirements.txt, render.yaml.
project: "SECPHO Intelligence System"
change: "intelligence-upgrade (unmerged branch; current Render deploy runs pre-session code at commit 9d74ede)"
date: "2026-06-17"
owner: "Daniel / SECPHO"

reviewer: "LaunchGuardian (Claude)"
launch_type: "Closed, password-gated internal pilot for SECPHO staff over SECPHO's own member data. NOT public/multi-tenant SaaS."
overall_result: "FAIL for broad/public launch (Gates 14/17/18 blocking). CONDITIONAL GO for a closed SECPHO-staff demo pending owner Gate 20 sign-off and the listed conditions."

related_gates:
  - "Gate 1 — Product, Asset & Data Inventory"
  - "Gate 5 — Frontend Exposure"
  - "Gate 13 — Webhooks, Background Jobs & Integrations"
  - "Gate 17 — Observability, Logs & Incident Readiness"

components:
  - name: "SECPHO Intelligence web app"
    type: "Single-file Python stdlib http.server application"
    description: "backend_api/mvp_web_app.py — serves the chat/search UI, the deterministic recommendation engine, the LLM grounding layer, and the bounded agent loop. No framework, no database; data is precomputed CSVs loaded into memory at startup. Custom router dispatches on self.path in do_GET/do_POST."
    repository_or_location: "C:/Users/Daniel Paez/Desktop/secpho_intelligence_system (backend_api/mvp_web_app.py)"
    environment: "Render web service (plan: free, single instance); start command python backend_api/mvp_web_app.py"
    public_exposure: "Internet-reachable URL behind Render TLS, but password-gated (AUTH_REQUIRED when SECPHO_APP_PASSWORD/SECPHO_ADMIN_PASSWORD set). Unauthenticated requests are redirected to /login or 401'd."
    owner: "Daniel / SECPHO"

  - name: "Precomputed recommendation/data CSVs"
    type: "Flat-file data store (no DB)"
    description: "Normalized member, socio, events, retos, subscriber, and match data read at startup. Includes recommendation_engine/outputs/people_matches_v1_1_events.csv, data/processed/members_normalized.csv, data/processed/suscriptores_normalized.csv (7968 newsletter contacts — largest PII set). Committed to the repo."
    repository_or_location: "recommendation_engine/outputs/*.csv, data/processed/*.csv"
    environment: "Committed in repo; loaded into in-memory DataFrames at app startup"
    public_exposure: "Not served as files; surfaced only via authenticated /api/* responses"
    owner: "Daniel / SECPHO"

  - name: "Recommendation engine"
    type: "Deterministic scoring/matching module (offline-built, in-process at serve time)"
    description: "Math-decides matching/scoring (people matcher v1.1 events). Scores are deterministic; the LLM only phrases, it cannot invent or reorder results."
    repository_or_location: "recommendation_engine/ (build_people_matcher_v1_1_events.py and outputs)"
    environment: "Outputs consumed by the web app at runtime"
    public_exposure: "Indirect (results surfaced via authenticated API)"
    owner: "Daniel / SECPHO"

  - name: "App state store (ephemeral)"
    type: "Local filesystem state under data/app_state"
    description: "Holds feedback_inbox.md (captured feedback), tool-learning-loop state, and the persisted .session_secret fallback. Lives on Render's EPHEMERAL disk — wiped on every redeploy. Gitignored."
    repository_or_location: "data/app_state/ (FEEDBACK_INBOX_PATH, .session_secret); generated charts in data/generated_artifacts/"
    environment: "Render ephemeral disk (not durable)"
    public_exposure: "feedback_inbox surfaced only to admins via /api/feedback-inbox; generated SVG artifacts served via authenticated /artifacts/<name>"
    owner: "Daniel / SECPHO"

  - name: "OpenAI Responses integration"
    type: "Outbound third-party LLM integration"
    description: "Fixed outbound URL https://api.openai.com/v1/responses (OPENAI_RESPONSES_URL). Receives user chat questions plus grounded data snippets (incl. member names/profiles) for phrasing. Auth via OPENAI_API_KEY. Bulk people lists drop emails (_agent_compact_person) as a privacy/exfiltration control."
    repository_or_location: "backend_api/mvp_web_app.py (OPENAI_RESPONSES_URL, agent_chat, llm_* helpers)"
    environment: "Outbound HTTPS from the Render service"
    public_exposure: "Outbound only; no user-controlled URL (no SSRF surface)"
    owner: "Daniel / SECPHO (OpenAI is a sub-processor — see Gate 14 follow-up)"

