  - "The deployed web app has NO file upload; the only outbound call is the fixed OpenAI URL (no user-controlled URL / no SSRF). Event-registration import is an offline pipeline (Gate 9 applies=false)."
  - "Single tenant (SECPHO only); the only boundary is authenticated-user vs admin role (Gate 16 applies=false; covered by Gates 6/8)."
  - "Gate 1 status: PASS — this record is the inventory."
