background_processes:
  - name: "Self-extending tool-learning loop"
    trigger: "Admin-reviewed/queued tool proposals; auto-builds ONLY the whitelisted create_socio_metric_chart tool (SVG output). Riskier proposals are queued for human review."
    permissions: "In-process; reads CSV data, writes SVG artifacts to data/generated_artifacts and loop state to data/app_state. No shell, no network beyond OpenAI."
    data_access: "Socio/company metrics for chart generation; allowlist containment. NOTE: codex_review_notes is a placeholder, not a real review (Gate 13 follow-up — keep allowlist tight)."

operational_controls:
  monitoring: "NONE — Handler.log_message is overridden to a no-op, so there are NO access logs and no error logging/alerting. Gate 17 BLOCKING: at least error + key-event logging and an incident owner required before real use. Gate 21 follow-up: add uptime + error + OpenAI-cost monitoring once live."
  alerting: "NONE. No abuse/error/cost alerting. AI cost exposure: the agent makes multiple LLM calls per question (mitigated by the llm rate bucket); monitor OpenAI spend (Gate 12 follow-up: cost alerts at scale)."
  backups: "NONE for runtime state. data/app_state (feedback_inbox.md, tool-loop state, .session_secret) is on Render's EPHEMERAL disk and is WIPED on every redeploy. Gate 18 BLOCKING: set SECPHO_SESSION_SECRET env (or sessions break on redeploy); add durable storage for feedback or export-before-redeploy; define a secret-rotation plan. CSV source data is durable in the repo. No retention policy or data-subject-deletion path defined (Gate 14)."
  rollback: "Do not merge the intelligence-upgrade branch / revert to commit 9d74ede; or unset the env vars to disable. Render redeploy from the prior commit restores the pre-session app."

admin_surfaces:
  - name: "GET /admin (ADMIN_HTML dashboard)"
    access_control: "Fail-closed, double-gated: is_admin() requires ADMIN_ENABLED (SECPHO_ADMIN_PASSWORD set) AND a session role == admin. Unauthenticated -> /login; non-admin -> redirect to /."
    audit_or_logging: "None (no admin action logging — see Gate 17)."
  - name: "GET /api/feedback-inbox"
    access_control: "Admin-only (is_admin); returns load_feedback_inbox() markdown. send_forbidden on non-admin."
    audit_or_logging: "None."
  - name: "GET /api/tool-requests"
    access_control: "Admin-only (is_admin); tool-loop request status view. send_forbidden on non-admin."
    audit_or_logging: "None."
  - name: "GET /api/tool-build-events"
    access_control: "Admin-only (is_admin); tool build events + generated-tools registry. send_forbidden on non-admin."
    audit_or_logging: "None."

data_stores:
  - name: "Member personal data (PII)"
    classification: "Personal (GDPR — EU/Spain)"
    location: "data/processed/members_normalized.csv, recommendation_engine/outputs/*.csv (committed); loaded into memory at startup"
    contents: "Full names, emails, role/title, company, municipality/province/country, technologies/sectors, optional personal context (hobbies/sports/instruments/languages, university)"
    access: "Any authenticated staff (read via chat/search); a single contact email surfaced on request; BULK people lists DROP email (_agent_compact_person) as a privacy control"
    retention: "Indefinite — no retention policy; no deletion path defined (Gate 14 follow-up)"
  - name: "Socio/company data"
    classification: "Business/contact"
    location: "data/processed (datosnegocio + datoscontacto normalized)"
    contents: "Company name, type, province, readiness, main_contact_email"
    access: "Any authenticated staff"
    retention: "Indefinite — no policy"
  - name: "Subscriber data"
    classification: "Personal (GDPR) — largest PII set"
    location: "data/processed/suscriptores_normalized.csv"
    contents: "7968 newsletter contact emails (enrichment/counts only)"
    access: "Authenticated staff (aggregate counts)"
    retention: "Indefinite — no policy"
  - name: "Captured feedback"
    classification: "User-generated free text + metadata"
    location: "data/app_state/feedback_inbox.md (Render EPHEMERAL disk; gitignored)"
    contents: "Free-text notes, selected member id, truncated user-agent"
    access: "Admin via /api/feedback-inbox"
    retention: "LOST on redeploy (Gate 18 BLOCKING)"
  - name: "Secrets"
    classification: "Credentials"
    location: "Environment variables only (.env and data/app_state gitignored; render.yaml marks all sync:false, set in Render dashboard; manually verified no secrets in committed files)"
    contents: "OPENAI_API_KEY, SECPHO_API_AUTH_TOKEN (offline pipeline only), SECPHO_APP_PASSWORD, SECPHO_ADMIN_PASSWORD, SECPHO_SESSION_SECRET"
    access: "Process environment; .session_secret fallback persisted to ephemeral disk"
    retention: "No rotation plan defined (Gate 18 follow-up)"

inventory_notes:
